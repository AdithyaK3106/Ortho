[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[project]
name = "cli-commands"
version = "0.1.0"
description = "CLI commands interface for Ortho"
authors = [{name = "Ortho Team", email = "urbrain369@gmail.com"}]

[tool.poetry.dependencies]
python = "^3.11"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4"
mypy = "^1.5"

[tool.mypy]
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
