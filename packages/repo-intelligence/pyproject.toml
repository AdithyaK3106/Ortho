[tool.poetry]
name = "ortho-repo-intelligence"
version = "0.1.0"
description = "Repository intelligence extraction and analysis"
authors = ["urbra <urbrain369@gmail.com>"]
packages = [
    { include = "repo_intelligence", from = "src" }
]

[tool.poetry.dependencies]
python = "^3.10"
tree-sitter = "^0.20.4"
tree-sitter-languages = "^1.10.2"
gitpython = "^3.1.40"

[tool.poetry.group.dev.dependencies]
pytest = "^7.0.0"
pytest-cov = "^4.0.0"
mypy = "^1.0.0"
ruff = "^0.0.200"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
