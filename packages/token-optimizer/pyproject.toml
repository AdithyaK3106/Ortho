[tool.poetry]
name = "ortho-token-optimizer"
version = "0.1.0"
description = "Context ranking and token optimization"
authors = ["urbra <urbrain369@gmail.com>"]
packages = [{ include = "token_optimizer", from = "src" }]

[tool.poetry.dependencies]
python = "^3.10"
# ortho-orchestration / ortho-context-hub were previously declared here as
# path dependencies, but token_optimizer's own source never imports
# either one (grep confirms zero references) -- they were dead weight.
# Worse: pip install -e (not `poetry install`) doesn't understand
# poetry's develop=true flag on a path dependency, so it built a second,
# separate non-editable wheel of context-hub/orchestration alongside the
# real editable installs install.sh/.bat/.ps1 already request via their
# own -e packages/X flags, and pip's resolver failed with a
# self-referential ResolutionImpossible on a genuinely clean install
# ("the user requested ortho-context-hub, ortho-token-optimizer depends
# on ortho-context-hub"). Removed rather than worked around, since
# nothing here actually needs them.

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
