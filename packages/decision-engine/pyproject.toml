[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[project]
name = "decision-engine"
version = "0.1.0"
description = "Multi-source decision orchestrator for Ortho"
authors = [{name = "Ortho Team", email = "urbrain369@gmail.com"}]

[tool.poetry.dependencies]
python = "^3.11"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4"
pytest-cov = "^4.1"
mypy = "^1.5"

[tool.mypy]
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=src/decision_engine --cov-report=term-missing -v"
