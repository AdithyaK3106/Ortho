[tool.poetry]
name = "context-hub"
version = "0.1.0"
description = "ContextHub: Pillar 2 — Persistent knowledge layer for Ortho"
authors = ["Ortho Team"]
license = "MIT"
packages = [
    { include = "context_hub", from = "src" }
]

[tool.poetry.dependencies]
python = "^3.11"
gitpython = "^3.1.0"

[tool.poetry.group.dev.dependencies]
pytest = "^7.0.0"
pytest-cov = "^4.0.0"
mypy = "^1.0.0"
ruff = "^0.0.200"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
